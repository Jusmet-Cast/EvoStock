<mat-sidenav-container class="shell">
  <mat-sidenav
    #sidenav
    class="shell-sidenav"
    [mode]="isHandset() ? 'over' : 'side'"
    [opened]="!isHandset()"
  >
    <div class="shell-brand">
      <img src="assets/branding/logo-cll-white.png" alt="Corporación LadyLee" class="shell-brand-logo" />
    </div>
    <mat-nav-list>
      @for (item of navItems; track item.path) {
        <a
          mat-list-item
          [routerLink]="item.path"
          routerLinkActive="active-link"
          [routerLinkActiveOptions]="{ exact: item.path === '/' }"
          (click)="isHandset() && sidenav.close()"
        >
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary" class="shell-toolbar">
      @if (isHandset()) {
        <button mat-icon-button (click)="sidenav.toggle()" aria-label="Abrir menú">
          <mat-icon>menu</mat-icon>
        </button>
        <img src="assets/branding/logo-cll-white.png" alt="" class="shell-toolbar-logo" />
      }
      <span class="shell-title">EvoStock</span>
      <span class="shell-spacer"></span>
      @if (currentUser(); as user) {
        <span class="shell-user">{{ user.name }}</span>
      }
      <button mat-icon-button (click)="logout()" aria-label="Cerrar sesión" title="Cerrar sesión">
        <mat-icon>logout</mat-icon>
      </button>
    </mat-toolbar>

    <main class="shell-content">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
