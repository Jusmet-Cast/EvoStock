<div class="page-header">
  <h1>Categorías</h1>
  <button mat-flat-button color="primary" (click)="openCreateDialog()">
    <mat-icon>add</mat-icon>
    Nueva categoría
  </button>
</div>

<mat-form-field appearance="outline" class="search-field">
  <mat-label>Buscar por nombre</mat-label>
  <input matInput [formControl]="searchControl" autocomplete="off" />
  <mat-icon matSuffix>search</mat-icon>
</mat-form-field>

<div class="table-card">
  @if (loading()) {
    <mat-progress-bar mode="indeterminate" />
  }

  <table mat-table [dataSource]="categories()" class="data-table">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Nombre</th>
      <td mat-cell *matCellDef="let category">{{ category.name }}</td>
    </ng-container>

    <ng-container matColumnDef="description">
      <th mat-header-cell *matHeaderCellDef>Descripción</th>
      <td mat-cell *matCellDef="let category">{{ category.description || '—' }}</td>
    </ng-container>

    <ng-container matColumnDef="is_active">
      <th mat-header-cell *matHeaderCellDef>Estado</th>
      <td mat-cell *matCellDef="let category">
        <mat-chip-set>
          <mat-chip [class.chip-active]="category.is_active" [class.chip-inactive]="!category.is_active">
            {{ category.is_active ? 'Activa' : 'Inactiva' }}
          </mat-chip>
        </mat-chip-set>
      </td>
    </ng-container>

    <ng-container matColumnDef="products_count">
      <th mat-header-cell *matHeaderCellDef># Productos</th>
      <td mat-cell *matCellDef="let category">{{ category.products_count ?? 0 }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef class="actions-header">Acciones</th>
      <td mat-cell *matCellDef="let category" class="actions-cell">
        <button mat-icon-button (click)="openEditDialog(category)" matTooltip="Editar">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button (click)="confirmDelete(category)" matTooltip="Eliminar">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

    <tr class="empty-row" *matNoDataRow>
      <td [attr.colspan]="displayedColumns.length">
        @if (!loading()) {
          No se encontraron categorías.
        }
      </td>
    </tr>
  </table>

  <mat-paginator
    [length]="total()"
    [pageSize]="pageSize"
    [pageIndex]="pageIndex()"
    [pageSizeOptions]="[10]"
    [hidePageSize]="true"
    (page)="onPageChange($event)"
  />
</div>
